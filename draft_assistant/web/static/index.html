<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f3f5fb;
      color: #1a1d2e;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
    input[type=range] { accent-color: #3a5bef; }
    .loading-screen {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 3px solid #e0e4ef;
      border-top-color: #3a5bef; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div style="font-size:14px;color:#6b7280">Loading Draft Assistant…</div>
    </div>
  </div>

  <!-- Tweak defaults -->
  <script>
  const TWEAK_DEFAULTS = {
    "scarcityWeight": 0.6,
    "adpSigma": 18,
    "byePenalty": 1,
    "benchRBWR": 0.18,
    "benchTE": 0.12,
    "benchQB": 0.08
  };
  </script>

  <!-- React + Babel vendored locally so the draft UI works without internet
       (react@18.3.1, react-dom@18.3.1, @babel/standalone@7.26.4) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>

  <!-- Recommendation scoring comes from the Python rest-of-draft rollout engine
       via POST /api/suggest (see draft-screen.jsx) — the single source of truth.
       opponent-model.js is kept: it powers the Opponents panel only. -->
  <script src="components/shared-utils.js"></script>
  <script src="components/opponent-model.js"></script>

  <!-- React components (transpiled in-browser by Babel) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/app-components.jsx"></script>
  <script type="text/babel" src="components/draft-screen.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
